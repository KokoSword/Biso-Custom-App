<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#16283E">
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>مندوب الأسنان — الكرخ</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;700&display=swap');
:root{--ink:#16283E;--paper:#F5F6F4;--card:#fff;--line:#E2E6EA;--mut:#6B7683;--ok:#1E7B4F;--warn:#B7791F;--bad:#B3382C}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'IBM Plex Sans Arabic',system-ui,sans-serif;background:var(--paper);color:var(--ink);overscroll-behavior:none}
#app{display:flex;flex-direction:column;height:100dvh}
header{background:var(--ink);color:#fff;padding:calc(env(safe-area-inset-top) + 10px) 14px 8px}
header h1{font-size:16px;font-weight:700}
header .sub{font-size:11px;opacity:.75;margin-top:1px}
.progress{height:5px;background:rgba(255,255,255,.18);border-radius:3px;margin-top:8px;overflow:hidden}
.progress i{display:block;height:100%;background:#4FC08D;border-radius:3px;transition:width .4s}
.chips{display:flex;gap:6px;overflow-x:auto;padding:8px 12px;background:var(--card);border-bottom:1px solid var(--line);scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{flex:0 0 auto;border:1.5px solid var(--line);border-radius:20px;padding:5px 12px;font-size:12.5px;font-weight:500;background:#fff;color:var(--ink);cursor:pointer;white-space:nowrap}
.chip.on{color:#fff;border-color:transparent;background:var(--ink)}
main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch}
.daytip{margin:10px 12px 0;padding:10px 12px;border-radius:10px;color:#fff;font-size:12.5px;line-height:1.7}
.daytip b{font-size:13.5px;display:block;margin-bottom:2px}
.route{position:relative;padding:8px 12px 96px}
.route.ribbon::before{content:"";position:absolute;top:20px;bottom:110px;right:31px;width:4px;background:var(--rc,#1D6FB8);border-radius:2px;opacity:.25}
.stop{position:relative;display:flex;gap:10px;margin:8px 0}
.pin{flex:0 0 42px;display:flex;flex-direction:column;align-items:center;z-index:1}
.pin b{width:30px;height:30px;border-radius:50%;background:var(--rc,#1D6FB8);color:#fff;display:flex;align-items:center;justify-content:center;font-size:13px;box-shadow:0 1px 3px rgba(0,0,0,.25)}
.stop.done .pin b{background:var(--ok)}
.card{flex:1;background:var(--card);border:1px solid var(--line);border-radius:12px;padding:10px 12px;min-width:0}
.stop.done .card{opacity:.65}
.nm{font-weight:700;font-size:14px;display:flex;justify-content:space-between;gap:6px;align-items:baseline}
.badge{font-size:10px;font-weight:500;color:#fff;border-radius:8px;padding:1.5px 7px;white-space:nowrap}
.lead{width:9px;height:9px;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:1px}
.meta{font-size:11.5px;color:var(--mut);margin-top:3px;line-height:1.6}
.sun{color:var(--warn);font-weight:700}.star{color:#B7791F;font-weight:700}
.debtline{font-size:11.5px;font-weight:700;color:var(--bad);margin-top:3px}
.fuline{font-size:11.5px;font-weight:700;color:#8a5cb8;margin-top:2px}
.acts{display:flex;gap:6px;margin-top:8px;flex-wrap:wrap}
.acts a,.acts button{flex:1 1 auto;min-width:56px;border:none;border-radius:9px;padding:8px 4px;font-size:11.5px;font-weight:700;font-family:inherit;text-align:center;text-decoration:none;cursor:pointer;color:var(--ink)}
.a-call{background:#EAF1F8;color:#1D6FB8}.a-wa{background:#E7F6EC;color:#128C4B}
.a-map{background:#FDF1E4;color:#B05B12}.a-done{background:#EFEFEF;color:#444}
.a-ord{background:#F0E9F8;color:#6b3fa0}.a-fu{background:#FBEAF2;color:#B0397A}.a-tpl{background:#E8F4F6;color:#0D7D8C}
.stop.done .a-done{background:var(--ok);color:#fff}
.a-call.dis,.a-wa.dis{opacity:.35;pointer-events:none}
.extra{margin-top:8px;display:none}
.stop.open .extra{display:block}
.extra input,.extra textarea,.extra select{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px;font-family:inherit;font-size:12.5px;margin-top:6px;background:#FBFCFC}
.extra label{font-size:11px;color:var(--mut)}
.savemark{font-size:11px;color:var(--ok);height:14px}
.mapwrap{position:relative;flex:1}#map{position:absolute;inset:0}
.leaflet-popup-content{font-family:'IBM Plex Sans Arabic',sans-serif;direction:rtl;text-align:right;margin:10px 12px;font-size:13px}
.numpin{background:transparent;border:none}
.numpin div{width:26px;height:26px;border-radius:50% 50% 50% 4px;color:#fff;font-weight:700;font-size:11.5px;display:flex;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.4);border:2px solid #fff}
.search{padding:10px 12px 0}
.search input{width:100%;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;font-family:inherit;font-size:14px;background:#fff}
.filters{display:flex;gap:6px;padding:8px 12px;flex-wrap:wrap}
.filters .chip{font-size:11.5px;padding:4px 10px}
.count{padding:0 14px;font-size:11.5px;color:var(--mut)}
.pad{padding:12px 12px 96px}
.sec{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
.sec h3{font-size:13.5px;margin-bottom:6px}
.seg{display:flex;background:#EDEFF1;border-radius:10px;padding:3px;margin:10px 12px 0}
.seg button{flex:1;border:none;border-radius:8px;padding:8px;font-family:inherit;font-size:12.5px;font-weight:700;background:none;color:var(--mut);cursor:pointer}
.seg button.on{background:#fff;color:var(--ink);box-shadow:0 1px 2px rgba(0,0,0,.08)}
.row{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.row:last-child{border-bottom:none}
.row .l{min-width:0}.row .l b{display:block;font-size:13px}
.row .l span{font-size:11px;color:var(--mut)}
.amt{font-weight:700;white-space:nowrap}.amt.red{color:var(--bad)}.amt.grn{color:var(--ok)}
.mini{border:1px solid var(--line);background:#fff;border-radius:8px;padding:5px 10px;font-family:inherit;font-size:11.5px;font-weight:700;cursor:pointer;color:var(--ink)}
.fab{position:fixed;bottom:76px;right:16px;background:var(--ink);color:#fff;border:none;border-radius:26px;padding:13px 20px;font-family:inherit;font-size:14px;font-weight:700;box-shadow:0 3px 10px rgba(0,0,0,.3);cursor:pointer;z-index:500}
.overlay{position:fixed;inset:0;background:rgba(10,20,35,.5);z-index:1000;display:none;align-items:flex-end}
.overlay.show{display:flex}
.sheet{background:var(--paper);width:100%;max-height:92dvh;border-radius:16px 16px 0 0;display:flex;flex-direction:column}
.sheet .hd{display:flex;justify-content:space-between;align-items:center;padding:14px 16px 8px}
.sheet .hd b{font-size:15px}
.sheet .hd button{border:none;background:#EDEFF1;border-radius:50%;width:30px;height:30px;font-size:15px;cursor:pointer}
.sheet .bd{overflow-y:auto;padding:0 14px 20px}
.sheet input,.sheet select,.sheet textarea{width:100%;border:1px solid var(--line);border-radius:9px;padding:9px;font-family:inherit;font-size:13px;margin-top:6px;background:#fff}
.sheet label{font-size:11.5px;color:var(--mut);display:block;margin-top:9px}
.oline{display:flex;gap:6px;margin-top:6px;align-items:center}
.oline select{flex:2.4;margin-top:0}.oline input{margin-top:0}
.oline .q{flex:.9}.oline .p{flex:1.3}
.oline button{border:none;background:#F6E3E1;color:var(--bad);border-radius:8px;width:34px;height:34px;font-weight:700;cursor:pointer;flex:0 0 34px}
.total{display:flex;justify-content:space-between;font-size:14px;font-weight:700;padding:10px 2px 0}
.bar{display:flex;align-items:center;gap:8px;margin:7px 0;font-size:12.5px}
.bar .tk{flex:1;height:8px;background:#EDEFF1;border-radius:4px;overflow:hidden}
.bar .tk i{display:block;height:100%;border-radius:4px}
.bar .lb{flex:0 0 128px}.bar .vl{flex:0 0 46px;text-align:left;color:var(--mut);font-size:11px}
.bignum{font-size:34px;font-weight:700;line-height:1}
.btnrow{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap}
.btnrow button{flex:1;border:1.5px solid var(--line);background:#fff;border-radius:10px;padding:10px;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;min-width:90px}
nav{display:flex;background:var(--card);border-top:1px solid var(--line);padding-bottom:env(safe-area-inset-bottom)}
nav button{flex:1;border:none;background:none;font-family:inherit;padding:8px 0 6px;font-size:10.5px;color:var(--mut);cursor:pointer;font-weight:500;position:relative}
nav button .ic{display:block;font-size:18px;margin-bottom:1px}
nav button.on{color:var(--ink);font-weight:700}
nav .dot{position:absolute;top:5px;right:calc(50% - 15px);background:var(--bad);color:#fff;font-size:9px;border-radius:8px;padding:0 4px;min-width:14px}
.hide{display:none!important}
.toast{position:fixed;bottom:78px;right:50%;transform:translateX(50%);background:var(--ink);color:#fff;font-size:12.5px;padding:9px 16px;border-radius:20px;opacity:0;transition:.3s;pointer-events:none;z-index:3000}
.toast.show{opacity:1}
.empty{color:var(--mut);font-size:12.5px;text-align:center;padding:18px 0}
</style>
</head>
<body>
<div id="app">
 <header>
  <h1>مندوب الأسنان — الكرخ</h1>
  <div class="sub" id="subline"></div>
  <div class="progress"><i id="pbar" style="width:0%"></i></div>
 </header>
 <div class="chips" id="daychips"></div>

 <main id="viewDay"><div id="daytip" class="daytip"></div><div class="route ribbon" id="routeList"></div></main>
 <main id="viewMap" class="hide"><div class="mapwrap"><div id="map"></div></div></main>
 <main id="viewAll" class="hide">
   <div class="search"><input id="q" type="search" placeholder="ابحث بالاسم أو الشارع أو المنطقة…"></div>
   <div class="filters" id="fchips"></div>
   <div class="count" id="qcount"></div>
   <div class="route" id="allList" style="--rc:#8896A6"></div>
 </main>
 <main id="viewSales" class="hide">
   <div class="seg"><button class="on" onclick="salesTab('orders',this)">🧾 الطلبيات</button><button onclick="salesTab('products',this)">📦 المنتجات والأسعار</button></div>
   <div class="pad" id="salesBox"></div>
 </main>
 <main id="viewMoney" class="hide"><div class="pad" id="moneyBox"></div></main>
 <main id="viewStats" class="hide"><div class="pad" id="statsBox"></div></main>
 <nav>
  <button data-v="Day" class="on"><span class="ic">🧭</span>الجولة</button>
  <button data-v="Map"><span class="ic">🗺️</span>الخريطة</button>
  <button data-v="All"><span class="ic">🔍</span>الكل</button>
  <button data-v="Sales"><span class="ic">🛒</span>المبيعات</button>
  <button data-v="Money" id="tabMoney"><span class="ic">💰</span>الذمم<span class="dot hide" id="fudot"></span></button>
  <button data-v="Stats"><span class="ic">📊</span>تقدّمي</button>
 </nav>
</div>
<button class="fab hide" id="fabOrder" onclick="openOrderSheet()">＋ طلبية</button>
<div class="overlay" id="ov"><div class="sheet"><div class="hd"><b id="ovTitle"></b><button onclick="closeOv()">✕</button></div><div class="bd" id="ovBody"></div></div></div>
<div class="toast" id="toast"></div>

const SEEDP = [["كومبوزت A2 (سرنجة)","قطعة"],["بوند Bonding","قنينة"],["أسيد Etchant","سرنجة"],["ألجينيت 450غ","علبة"],["جبس صخري","كيس"],["قفازات لاتكس","علبة 100"],["كمامات طبية","علبة 50"],["إبر بنج قصيرة","علبة 100"],["بنج ليدوكائين","علبة 50"],["أقلام حفر Diamond","قطعة"],["ملفات إندو K-Files","طقم"],["ورق كواشف","دفتر"],["أملغم كبسول","علبة 50"],["سائل تعقيم","لتر"]];
const byId = {}; DATA.forEach(c=>byId[c.id]=c);

/* ================= storage ================= */
let MEM = null;
function load(){
  let raw=null;
  try{ raw = localStorage.getItem('kdental2'); }catch(e){}
  if(raw){ try{ return JSON.parse(raw); }catch(e){} }
  // migrate from v1
  let v1=null; try{ v1 = JSON.parse(localStorage.getItem('kdental')||'null'); }catch(e){}
  const s = {clinics: v1||{}, products: SEEDP.map((p,i)=>({id:'p'+i, n:p[0], u:p[1], pr:0})), orders: [], cfg:{office:'مكتبي', target:15}};
  return s;
}
let S = MEM = load();
function persist(){ try{ localStorage.setItem('kdental2', JSON.stringify(S)); }catch(e){ MEM=S; } refreshHeader(); }
const rec = id => S.clinics[id] || {};
function saveC(id, patch){ S.clinics[id] = Object.assign({}, S.clinics[id]||{}, patch); persist(); }
const fmt = n => (Math.round(n)||0).toLocaleString('en-US');
const today = () => new Date().toISOString().slice(0,10);

/* ---- money helpers ---- */
function orderTotal(o){ return o.lines.reduce((s,l)=>s+l.q*l.p,0) - (o.disc||0); }
function orderPaid(o){ return (o.payments||[]).reduce((s,p)=>s+p.amt,0); }
function clinicDebt(cid){ return S.orders.filter(o=>o.cid===cid).reduce((s,o)=>s+Math.max(0,orderTotal(o)-orderPaid(o)),0); }
function totalDebt(){ return S.orders.reduce((s,o)=>s+Math.max(0,orderTotal(o)-orderPaid(o)),0); }
function monthSales(){ const m=today().slice(0,7); return S.orders.filter(o=>o.date.startsWith(m)).reduce((s,o)=>s+orderTotal(o),0); }
function fuDue(){ const t=today(); return DATA.filter(c=>{const f=rec(c.id).fu; return f&&f.date&&f.date<=t;}); }

let curDay="1", curView="Day", curSales="orders", map=null, layer=null, activeFilters=new Set();
const $ = s => document.querySelector(s);
function toast(m){ const t=$('#toast'); t.textContent=m; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),1700); }
function phoneOf(c){ const r=rec(c.id); return (r.ph&&r.ph.trim())||c.ph; }
function waOf(c){ const p=phoneOf(c); if(!p) return ""; let d=p.replace(/\D/g,''); if(d.startsWith('0')) d='964'+d.slice(1); if(!d.startsWith('964')) d='964'+d; return d; }
const visited = c => !!rec(c.id).v;
const LEADC = {"A":"#1E7B4F","B":"#B7791F","C":"#B3382C","":"#C8D0D8"};

/* ================= clinic card ================= */
function cardHTML(c, showDay){
  const r=rec(c.id), p=phoneOf(c), w=waOf(c), dm=DMETA[c.day];
  const debt=clinicDebt(c.id);
  const fu=r.fu&&r.fu.date?r.fu:null;
  return `
  <div class="stop ${r.v?'done':''}" data-id="${c.id}">
   <div class="pin"><b>${c.ord}</b></div>
   <div class="card">
    <div class="nm"><span><span class="lead" style="background:${LEADC[r.lead||'']}"></span>${c.n} ${c.m?'<span class="sun">☀</span>':''}</span>
      <span class="badge" style="background:${dm.c}">${showDay?('ي'+c.day+' · '):''}${c.d}</span></div>
    <div class="meta">${c.st?c.st+' · ':''}${c.hr||'الدوام غير معروف'}${c.r?` · <span class="star">★ ${c.r}</span> (${c.rc})`:''}${c.note?`<br>📌 ${c.note}`:''}</div>
    ${debt>0?`<div class="debtline">💰 ذمة: ${fmt(debt)} د.ع</div>`:''}
    ${fu?`<div class="fuline">⏰ متابعة: ${fu.date}${fu.note?' — '+fu.note:''}</div>`:''}
    <div class="acts">
      <a class="a-call ${p?'':'dis'}" href="tel:${(p||'').replace(/\s/g,'')}">📞</a>
      <a class="a-wa ${w?'':'dis'}" href="https://wa.me/${w}" target="_blank">💬</a>
      <a class="a-map" href="${c.g}" target="_blank">🗺️ توجيه</a>
      <button class="a-done" onclick="toggleV('${c.id}')">${r.v?'✔ تمت':'☐ زيارة'}</button>
    </div>
    <div class="acts">
      <button class="a-ord" onclick="openOrderSheet('${c.id}')">🛒 طلبية</button>
      <button class="a-fu" onclick="openFuSheet('${c.id}')">⏰ متابعة</button>
      <button class="a-tpl ${w?'':'dis'}" onclick="openTplSheet('${c.id}')">💬 قوالب</button>
    </div>
    <div class="extra">
      <label>تصنيف العميل</label>
      <select onchange="saveC('${c.id}',{lead:this.value});rerender()">
        <option value="" ${!r.lead?'selected':''}>غير مصنّف</option>
        <option value="A" ${r.lead==='A'?'selected':''}>A — عميل قوي 🟢</option>
        <option value="B" ${r.lead==='B'?'selected':''}>B — محتمل 🟡</option>
        <option value="C" ${r.lead==='C'?'selected':''}>C — ضعيف 🔴</option>
      </select>
      <label>الهاتف (سجّله إن كان ناقصاً)</label>
      <input value="${r.ph||c.ph||''}" placeholder="07xx xxx xxxx" onchange="saveC('${c.id}',{ph:this.value});markSaved(this)">
      <label>جهة الاتصال (الطبيب / السكرتيرة)</label>
      <input value="${(r.who||'').replace(/"/g,'&quot;')}" placeholder="د. …" onchange="saveC('${c.id}',{who:this.value});markSaved(this)">
      <label>ملاحظات</label>
      <textarea rows="2" onchange="saveC('${c.id}',{note:this.value});markSaved(this)">${r.note||''}</textarea>
      <div class="savemark">${r.date?('آخر زيارة: '+r.date):''}</div>
      ${S.orders.filter(o=>o.cid===c.id).length?`<button class="mini" style="margin-top:6px" onclick="showClinicOrders('${c.id}')">🧾 طلبيات العيادة (${S.orders.filter(o=>o.cid===c.id).length})</button>`:''}
    </div>
   </div>
  </div>`;
}
function markSaved(el){ const sm=el.closest('.extra').querySelector('.savemark'); const old=sm.textContent; sm.textContent='✓ حُفظ'; setTimeout(()=>sm.textContent=old,1200); }
function toggleV(id){
  const now=!rec(id).v;
  saveC(id,{v:now, date: now?today():rec(id).date});
  rerender(); toast(now?'سُجّلت الزيارة ✔':'أُلغيت الزيارة');
}
window.toggleV=toggleV; window.saveC=saveC; window.markSaved=markSaved;

function rerender(){ render(); if(curView==='Map') drawMap(); if(curView==='Sales') renderSales(); if(curView==='Money') renderMoney(); if(curView==='Stats') renderStats(); }

/* ================= header/chips/day ================= */
function refreshHeader(){
  const done=DATA.filter(visited).length;
  $('#pbar').style.width=(100*done/DATA.length).toFixed(1)+'%';
  $('#subline').textContent=`${done}/${DATA.length} زيارة · مبيعات الشهر ${fmt(monthSales())} د.ع · ذمم ${fmt(totalDebt())} د.ع`;
  const due=fuDue().length, dot=$('#fudot');
  dot.classList.toggle('hide', due===0); dot.textContent=due;
}
function buildChips(){
  const el=$('#daychips'); el.innerHTML='';
  for(const d of Object.keys(DMETA)){
    const m=DMETA[d], b=document.createElement('button');
    b.className='chip'+(d===curDay?' on':'');

function attachExpand(box){

const FILTERS=[["m","☀ صباحي"],["nop","بدون رقم"],["todo","لم تُزَر"],["debt","عليها ذمة"],["A","عملاء A"],["gov","حكومي"],["top","★4.5+"]];
function buildFilters(){
  const el=$('#fchips'); el.innerHTML='';
  for(const [k,l] of FILTERS){
    const b=document.createElement('button');
    b.className='chip'+(activeFilters.has(k)?' on':'');
    b.textContent=l;
    b.onclick=()=>{activeFilters.has(k)?activeFilters.delete(k):activeFilters.add(k); buildFilters(); renderAllList();};
    el.appendChild(b);
  }
}
function renderAllList(){
  const q=($('#q').value||'').trim();
  let list=DATA.slice();
  if(q) list=list.filter(c=>(c.n+' '+c.st+' '+c.d).includes(q));
  if(activeFilters.has('m')) list=list.filter(c=>c.m);
  if(activeFilters.has('nop')) list=list.filter(c=>!phoneOf(c));
  if(activeFilters.has('todo')) list=list.filter(c=>!visited(c));
  if(activeFilters.has('debt')) list=list.filter(c=>clinicDebt(c.id)>0);
  if(activeFilters.has('A')) list=list.filter(c=>rec(c.id).lead==='A');
  if(activeFilters.has('gov')) list=list.filter(c=>c.gov);
  if(activeFilters.has('top')) list=list.filter(c=>c.r>=4.5);
  $('#qcount').textContent=list.length+' نتيجة';
  const box=$('#allList');
  box.innerHTML=list.map(c=>cardHTML(c,true)).join('')||'<div class="empty">لا نتائج</div>';
  attachExpand(box);
}

/* ================= map ================= */
function drawMap(){
  if(!window.L){ toast('الخريطة تحتاج إنترنت'); return; }
  if(!map){
    map=L.map('map').setView([33.31,44.36],12);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{maxZoom:19,attribution:'© OpenStreetMap'}).addTo(map);
  }
  if(layer) layer.remove();
  layer=L.layerGroup().addTo(map);
  const list=DATA.filter(c=>c.day===curDay), m=DMETA[curDay], pts=[];
  for(const c of list){
    pts.push([c.lat,c.lng]);
    const done=visited(c);
    const icon=L.divIcon({className:'numpin',html:`<div style="background:${done?'#1E7B4F':m.c}">${c.ord}</div>`,iconSize:[26,26],iconAnchor:[13,24]});
    const p=phoneOf(c), w=waOf(c);
    const pop=`<b>${c.ord}. ${c.n}</b><br><span style="color:#6B7683;font-size:11.5px">${c.st||c.d} · ${c.hr||''}</span>
      <div class="acts">
       ${p?`<a class="a-call" href="tel:${p.replace(/\s/g,'')}">📞</a>`:''}
       ${w?`<a class="a-wa" href="https://wa.me/${w}" target="_blank">💬</a>`:''}
       <a class="a-map" href="${c.g}" target="_blank">🗺️</a>
       <a class="a-done" href="#" onclick="toggleV('${c.id}');return false;">${done?'✔':'☐'}</a>
       <a class="a-ord" href="#" onclick="openOrderSheet('${c.id}');return false;">🛒</a>
      </div>`;
    L.marker([c.lat,c.lng],{icon}).bindPopup(pop).addTo(layer);
  }
  L.polyline(pts,{color:m.c,weight:3,opacity:.5,dashArray:'6 6'}).addTo(layer);
  map.fitBounds(pts,{padding:[30,30]});
}

    <label>خصم (د.ع)</label>
    <input type="number" min="0" value="${draft.disc}" onchange="draft.disc=+this.value||0;renderOrderSheet()">
    <label>المدفوع الآن (د.ع)</label>
    <input type="number" min="0" value="${draft.pay}" onchange="draft.pay=+this.value||0;renderOrderSheet()">
    <div class="total"><span>الإجمالي</span><span>${fmt(total)} د.ع</span></div>
    <div class="total" style="color:var(--bad)"><span>المتبقي (آجل)</span><span>${fmt(Math.max(0,total-(+draft.pay||0)))} د.ع</span></div>
    <div class="btnrow">

    </div>`);
}
function draftProd(i,pid){
  draft.lines[i].pid=pid;
  const p=S.products.find(x=>x.id===pid);
  if(p && p.pr) draft.lines[i].p=p.pr;
  renderOrderSheet();
}
window.draftProd=draftProd;
function saveOrder(){
  if(!draft.cid){ toast('اختر العيادة أولاً'); return; }
  const lines=draft.lines.filter(l=>l.pid&&l.q>0).map(l=>{const p=S.products.find(x=>x.id===l.pid);return {pid:l.pid,n:p?p.n:'مادة',q:l.q,p:l.p};});
  if(!lines.length){ toast('أضف مادة واحدة على الأقل'); return; }
  const o={id:'o'+Date.now(), cid:draft.cid, date:today(), lines, disc:+draft.disc||0, payments: (+draft.pay>0)?[{d:today(),amt:+draft.pay}]:[]};
  S.orders.unshift(o); persist(); closeOv(); rerender();
  toast('حُفظت الطلبية 🧾');
  setTimeout(()=>{ if(confirm('إرسال الفاتورة واتساب للعيادة؟')) waInvoice(o.id); }, 250);
}
window.saveOrder=saveOrder;
function invoiceText(o){
  const c=byId[o.cid], t=orderTotal(o), pd=orderPaid(o);
  let s=`🧾 *فاتورة — ${S.cfg.office}*\n`;
  s+=`العيادة: ${c.n}\nالتاريخ: ${o.date}\n———————\n`;
  o.lines.forEach(l=>{ s+=`• ${l.n} × ${l.q} = ${fmt(l.q*l.p)} د.ع\n`; });
  if(o.disc) s+=`خصم: -${fmt(o.disc)} د.ع\n`;
  s+=`———————\n*الإجمالي: ${fmt(t)} د.ع*\nالمدفوع: ${fmt(pd)} د.ع\nالمتبقي: ${fmt(Math.max(0,t-pd))} د.ع\n\nشكراً لتعاملكم 🌹`;
  return s;
}
function waInvoice(oid){
  const o=S.orders.find(x=>x.id===oid); if(!o) return;
  const c=byId[o.cid], w=waOf(c);
  const url = w ? `https://wa.me/${w}?text=${encodeURIComponent(invoiceText(o))}` : `https://wa.me/?text=${encodeURIComponent(invoiceText(o))}`;
  window.open(url,'_blank');
}
window.waInvoice=waInvoice;
function addPayment(oid){
  const v=prompt('مبلغ الدفعة (د.ع):'); const amt=+((v||'').replace(/\D/g,''));
  if(!amt) return;
  const o=S.orders.find(x=>x.id===oid);
  o.payments=o.payments||[]; o.payments.push({d:today(),amt});
  persist(); rerender(); toast('سُجّلت الدفعة ✔');

       <button onclick="importB()">⬆ استيراد</button>
       <button onclick="exportCSV()">📄 تقرير CSV</button>
       <button style="color:var(--bad)" onclick="if(confirm('حذف كل البيانات (زيارات، طلبيات، ذمم)؟')){localStorage.removeItem('kdental2');location.reload();}">↺ تصفير</button>
     </div>
   </div>`;
}
function exportB(){
  const blob=new Blob([JSON.stringify(S)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='dental-rep-backup-'+today()+'.json'; a.click(); toast('صُدّرت النسخة ⬇');
}
function importB(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='.json';
  inp.onchange=e=>{const f=e.target.files[0],r=new FileReader();
    r.onload=()=>{try{S=JSON.parse(r.result);persist();rerender();toast('تم الاستيراد ✔');}catch(err){toast('ملف غير صالح');}};
    r.readAsText(f);};
  inp.click();
}
function exportCSV(){
  let csv='\uFEFFالعيادة,المنطقة,اليوم,الهاتف,التصنيف,زيارة,تاريخ الزيارة,جهة الاتصال,مبيعات,ذمة,ملاحظات\n';
  for(const c of DATA){
    const r=rec(c.id);
    const sales=S.orders.filter(o=>o.cid===c.id).reduce((s,o)=>s+orderTotal(o),0);
    csv+=[c.n,c.d,c.day,phoneOf(c)||'',r.lead||'',r.v?'تمت':'',r.date||'',r.who||'',sales,clinicDebt(c.id),(r.note||'').replace(/[,\n]/g,' ')].map(x=>`"${x}"`).join(',')+'\n';
  }
  const blob=new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob);
  a.download='dental-rep-report-'+today()+'.csv'; a.click(); toast('صُدّر التقرير 📄');
}
window.exportB=exportB; window.importB=importB; window.exportCSV=exportCSV;

/* ================= tabs ================= */
document.querySelectorAll('nav button').forEach(b=>{
  b.onclick=()=>{
    document.querySelectorAll('nav button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on'); curView=b.dataset.v;
    ['Day','Map','All','Sales','Money','Stats'].forEach(v=>$('#view'+v).classList.toggle('hide',v!==curView));
    $('#fabOrder').classList.toggle('hide', curView!=='Sales');
    if(curView==='Map'){setTimeout(()=>{drawMap();map&&map.invalidateSize();},50);}
    if(curView==='Sales') renderSales();
    if(curView==='Money') renderMoney();
    if(curView==='Stats') renderStats();
  };
});
$('#q').addEventListener('input',renderAllList);
buildChips(); buildFilters(); render();

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#0E7C7B">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<title>DentLab</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css">
<style>
:root{
  --bg:#F4F6F8; --card:#FFFFFF; --ink:#1B2B33; --ink-soft:#5A6E77;
  --line:#DCE3E5; --teal:#0E7C7B; --teal-deep:#0A5C5B; --teal-soft:#E3F0EF;
  --amber:#D9A441; --amber-soft:#F7EEDB; --coral:#D95D4E; --coral-soft:#FBE9E6;
  --green:#3E8E5A; --green-soft:#E6F2EA;
  --radius:14px; --shadow:0 1px 3px rgba(27,43,51,.08), 0 4px 14px rgba(27,43,51,.05);
}
*{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
html,body{margin:0; padding:0}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,"Noto Sans",sans-serif;
  background:var(--bg); color:var(--ink); font-size:15.5px; line-height:1.5;
  padding-bottom:calc(76px + env(safe-area-inset-bottom));
}
h1,h2,h3{margin:0; line-height:1.25}
button{font:inherit; border:none; background:none; color:inherit; cursor:pointer}
input,select,textarea{
  font:inherit; color:var(--ink); background:var(--bg);
  border:1.5px solid var(--line); border-radius:10px; padding:10px 12px; width:100%;
}
input:focus,select:focus,textarea:focus{outline:none; border-color:var(--teal)}
label{display:block; font-size:12.5px; font-weight:600; letter-spacing:.04em; text-transform:uppercase; color:var(--ink-soft); margin:14px 0 5px}

/* Header */
header{
  position:sticky; top:0; z-index:20; background:var(--teal); color:#fff;
  padding:calc(12px + env(safe-area-inset-top)) 18px 12px; display:flex; align-items:center; justify-content:space-between;
}
header .brand{font-weight:800; font-size:19px; letter-spacing:.02em}
header .brand span{color:#BFE3DC; font-weight:500}
header .date{font-size:12.5px; opacity:.85}
header .gear{font-size:20px; padding:6px; border-radius:8px}
header .gear:active{background:rgba(255,255,255,.15)}

main{padding:16px 16px 8px; max-width:640px; margin:0 auto}
.view{display:none}
.view.active{display:block; animation:fade .18s ease}
@keyframes fade{from{opacity:0; transform:translateY(4px)}to{opacity:1; transform:none}}
@media (prefers-reduced-motion:reduce){*{animation:none!important; transition:none!important}}

/* Cards & generic */
.card{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:14px 16px; margin-bottom:12px}
.section-title{font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--ink-soft); margin:20px 0 10px}
.section-title:first-child{margin-top:4px}
.muted{color:var(--ink-soft); font-size:13.5px}
.empty{color:var(--ink-soft); text-align:center; padding:28px 12px; font-size:14px}
.pill{display:inline-block; font-size:11.5px; font-weight:700; padding:3px 9px; border-radius:99px; letter-spacing:.03em}
.pill.overdue{background:var(--coral-soft); color:var(--coral)}
.pill.soon{background:var(--amber-soft); color:#9C7320}
.pill.ok{background:var(--teal-soft); color:var(--teal-deep)}
.pill.done{background:var(--green-soft); color:var(--green)}
.btn{
  display:inline-flex; align-items:center; justify-content:center; gap:6px;
  background:var(--teal); color:#fff; font-weight:700; border-radius:12px; padding:12px 18px; width:100%;
}
.btn:active{background:var(--teal-deep)}
.btn.ghost{background:var(--teal-soft); color:var(--teal-deep)}
.btn.danger{background:var(--coral-soft); color:var(--coral)}
.row2{display:grid; grid-template-columns:1fr 1fr; gap:10px}

/* Stats strip */
.stats{display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:6px}
.stat{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:12px 8px; text-align:center}
.stat b{display:block; font-size:24px; font-weight:800; line-height:1.1}
.stat span{font-size:11.5px; color:var(--ink-soft); font-weight:600; letter-spacing:.03em}
.stat.alert b{color:var(--coral)}
.stat.warn b{color:#9C7320}

/* Case cards */
.case{display:block; text-align:left; width:100%; background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:13px 15px; margin-bottom:11px; border-left:4px solid var(--line)}
.case.overdue{border-left-color:var(--coral)}
.case.soon{border-left-color:var(--amber)}
.case.active{border-left-color:var(--teal)}
.case.done{border-left-color:var(--green)}
.case .top{display:flex; justify-content:space-between; align-items:baseline; gap:8px}
.case .name{font-weight:700; font-size:16px}
.case .meta{font-size:13px; color:var(--ink-soft); margin-top:2px}
.case .meta .shade{
  display:inline-block; font-size:11px; font-weight:800; color:#6B5222;
  background:linear-gradient(180deg,#FBF6E8,#EFDFB8); border:1px solid #E2CF9C;
  border-radius:4px 4px 7px 7px; padding:1px 7px; margin-left:4px;
}
.steps{display:flex; gap:4px; margin-top:9px}
.steps i{flex:1; height:5px; border-radius:3px; background:var(--line)}
.steps i.on{background:var(--teal)}
.steps i.remake{background:var(--coral)}
.case .status-line{display:flex; justify-content:space-between; font-size:12px; color:var(--ink-soft); margin-top:5px}

/* Filter chips */
.chips{display:flex; gap:8px; overflow-x:auto; padding:2px 2px 12px; scrollbar-width:none}
.chips::-webkit-scrollbar{display:none}
.chip{white-space:nowrap; font-size:13px; font-weight:600; padding:7px 14px; border-radius:99px; background:var(--card); color:var(--ink-soft); box-shadow:var(--shadow)}
.chip.sel{background:var(--ink); color:#fff}

/* Quota */
.quota-item{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); padding:13px 15px; margin-bottom:11px}
.quota-item .top{display:flex; justify-content:space-between; align-items:center; gap:10px}
.quota-item .qname{font-weight:700}
.quota-item .count{font-variant-numeric:tabular-nums; font-weight:800; font-size:15px}
.quota-item .count small{color:var(--ink-soft); font-weight:600}
.qbar{display:flex; gap:3px; margin-top:10px}
.qbar i{flex:1; height:9px; border-radius:3px 3px 5px 5px; background:var(--line)}
.qbar i.f{background:linear-gradient(180deg,#17918F,#0A5C5B)}
.qbar i.f.last{background:linear-gradient(180deg,#E5B95C,#C08F2C)}
.qctrl{display:flex; gap:8px; margin-top:11px}
.qctrl button{flex:1; font-weight:800; font-size:17px; border-radius:10px; padding:7px 0; background:var(--bg); border:1.5px solid var(--line)}
.qctrl button:active{background:var(--teal-soft); border-color:var(--teal)}
.qctrl .edit{font-size:13px; font-weight:600; color:var(--ink-soft)}

/* Guide accordion */
details.guide{background:var(--card); border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:11px; overflow:hidden}
details.guide summary{
  list-style:none; display:flex; align-items:center; gap:11px; padding:14px 16px;
  font-weight:700; cursor:pointer; user-select:none;
}
details.guide summary::-webkit-details-marker{display:none}
details.guide summary .ico{font-size:19px}
details.guide summary::after{content:"›"; margin-left:auto; font-size:20px; color:var(--ink-soft); transform:rotate(90deg); transition:transform .15s}
details.guide[open] summary::after{transform:rotate(-90deg)}
details.guide .body{padding:0 16px 15px; font-size:14.5px}
details.guide .body h4{margin:13px 0 5px; font-size:13px; letter-spacing:.06em; text-transform:uppercase; color:var(--teal-deep)}
details.guide .body ol,details.guide .body ul{margin:5px 0; padding-left:20px}
details.guide .body li{margin-bottom:4px}
details.guide .body .tip{background:var(--amber-soft); border-left:3px solid var(--amber); border-radius:0 8px 8px 0; padding:8px 11px; font-size:13.5px; margin:9px 0}
details.guide .body .warn{background:var(--coral-soft); border-left:3px solid var(--coral); border-radius:0 8px 8px 0; padding:8px 11px; font-size:13.5px; margin:9px 0}

/* Shade picker */
.shades{display:grid; grid-template-columns:repeat(4,1fr); gap:7px; margin-top:4px}
.shade-tab{
  font-size:12.5px; font-weight:800; padding:10px 0 8px; text-align:center; color:#5C4A1E;
  border:1.5px solid #E2CF9C; border-radius:6px 6px 12px 12px; position:relative;
}
.shade-tab.sel{outline:2.5px solid var(--teal); outline-offset:1px}
.shade-tab::before{content:""; position:absolute; top:-4px; left:50%; transform:translateX(-50%); width:16px; height:5px; background:#C9CFD2; border-radius:2px}

/* Bottom sheet */
.overlay{position:fixed; inset:0; background:rgba(20,32,38,.45); z-index:40; display:none}
.overlay.show{display:block}
.sheet{
  position:fixed; left:0; right:0; bottom:0; z-index:50; background:var(--card);
  border-radius:20px 20px 0 0; padding:10px 18px calc(20px + env(safe-area-inset-bottom));
  max-height:88vh; overflow-y:auto; transform:translateY(105%); transition:transform .22s ease;
  max-width:640px; margin:0 auto;
}
.sheet.show{transform:none}
.sheet .grab{width:42px; height:5px; background:var(--line); border-radius:3px; margin:4px auto 12px}
.sheet h2{font-size:18px; margin-bottom:2px}

/* Bottom nav */
nav{
  position:fixed; left:0; right:0; bottom:0; z-index:30; background:var(--card);
  border-top:1px solid var(--line); display:flex;
  padding:6px 4px calc(6px + env(safe-area-inset-bottom));
}
nav button{flex:1; display:flex; flex-direction:column; align-items:center; gap:2px; font-size:11px; font-weight:600; color:var(--ink-soft); padding:5px 0; border-radius:10px}
nav button .ni{font-size:21px; line-height:1}
nav button.sel{color:var(--teal-deep)}
nav button.sel .ni{transform:scale(1.08)}

/* FAB */
.fab{
  position:fixed; right:18px; bottom:calc(84px + env(safe-area-inset-bottom)); z-index:29;
  width:56px; height:56px; border-radius:18px; background:var(--teal); color:#fff;
  font-size:28px; font-weight:400; box-shadow:0 6px 18px rgba(14,124,123,.4);
  display:none; align-items:center; justify-content:center;
}
.fab.show{display:flex}
.fab:active{background:var(--teal-deep)}

/* Toast */
#toast{
  position:fixed; left:50%; bottom:calc(96px + env(safe-area-inset-bottom)); transform:translateX(-50%) translateY(20px);
  background:var(--ink); color:#fff; font-size:13.5px; font-weight:600; padding:9px 18px;
  border-radius:99px; opacity:0; transition:.25s; z-index:60; pointer-events:none; white-space:nowrap;
}
#toast.show{opacity:1; transform:translateX(-50%)}
:focus-visible{outline:2.5px solid var(--teal); outline-offset:2px}

/* Map & tour */
#map{height:44vh; min-height:280px; border-radius:var(--radius); box-shadow:var(--shadow); margin-bottom:12px; z-index:1; background:var(--line)}
.place-actions{display:flex; gap:8px; margin-top:10px; flex-wrap:wrap}
.place-actions a{flex:1; min-width:70px; text-align:center; font-size:12.5px; font-weight:700; padding:8px 4px; border-radius:10px; text-decoration:none}
.act-wa{background:#E7F6EC; color:#128C4A}
.act-call{background:var(--teal-soft); color:var(--teal-deep)}
.act-dir{background:var(--amber-soft); color:#9C7320}
.stopnum{background:var(--teal); color:#fff; font-weight:800; font-size:12px; width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; border:2px solid #fff; box-shadow:0 1px 4px rgba(0,0,0,.35)}
.tour-stop{display:flex; gap:10px; padding:7px 0; border-top:1px dashed var(--line); font-size:14px; cursor:pointer}
.tour-stop .n{color:var(--teal-deep); font-weight:800}
.map-pop button{display:block; width:100%; font-weight:700; font-size:13px; padding:7px 10px; border-radius:8px; background:var(--teal-soft); color:var(--teal-deep); margin-top:6px}
.btn.wa{background:#128C4A}
</style>
</head>
<body>

<header>
  <div>
    <div class="brand">Dent<span>Lab</span></div>
    <div class="date" id="hdrDate"></div>
  </div>
  <button class="gear" id="btnSettings" aria-label="Settings and backup">⚙︎</button>
</header>

<main>
  <!-- TODAY -->
  <section class="view" id="view-today"></section>
  <!-- CASES -->
  <section class="view" id="view-cases">
    <div class="chips" id="caseFilters"></div>
    <div id="caseList"></div>
  </section>
  <!-- QUOTA -->
  <section class="view" id="view-quota">
    <div id="quotaList"></div>
    <button class="btn ghost" id="btnAddQuota">+ Add requirement</button>
  </section>
  <!-- MAP -->
  <section class="view" id="view-map">
    <div id="map"></div>
    <div class="chips" id="mapTabs"></div>
    <div id="mapPanel"></div>
  </section>
  <!-- GUIDE -->
  <section class="view" id="view-guide"></section>
</main>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>

<button class="fab" id="fab" aria-label="Add case">+</button>

<nav>
  <button data-tab="today" class="sel"><span class="ni">☀︎</span>Today</button>
  <button data-tab="cases"><span class="ni">🦷</span>Cases</button>
  <button data-tab="quota"><span class="ni">▤</span>Quota</button>
  <button data-tab="map"><span class="ni">🗺</span>Map</button>
  <button data-tab="guide"><span class="ni">✎</span>Guide</button>
</nav>

<div class="overlay" id="overlay"></div>
<div class="sheet" id="sheet"></div>
<div id="toast" role="status"></div>

<script>
"use strict";
/* ---------------- State ---------------- */
const LS_KEY = "dentlab.v1";
const CASE_TYPES = ["Crown — Zirconia","Crown — PFM","Crown — E-max","Bridge","Post & Core","Veneer","Implant Crown","Complete Denture","RPD — Acrylic","RPD — Cr-Co","Night Guard","Inlay / Onlay","Other"];
const STATUSES = [
  {id:"prep",    label:"Preparation"},
  {id:"imp",     label:"Impression taken"},
  {id:"sent",    label:"Sent to lab"},
  {id:"tryin",   label:"Try-in / framework"},
  {id:"delivered",label:"Delivered / cemented"},
  {id:"remake",  label:"Remake needed"}
];
const SHADES = ["A1","A2","A3","A3.5","A4","B1","B2","B3","B4","C1","C2","C3","C4","D2","D3","D4"];
const SHADE_COLORS = {A1:"#F3EBDC",A2:"#EFE3CB","A3":"#EBDBB9","A3.5":"#E4CFA3",A4:"#DBC28E",B1:"#F4EEDA",B2:"#EFE6C4",B3:"#E7D8A6",B4:"#DFCB8F",C1:"#E8E1D0",C2:"#DFD5BC",C3:"#D5C8A7",C4:"#CBBB93",D2:"#E7DECE",D3:"#DDD2BC",D4:"#D2C5A9"};

const DEFAULT_QUOTA = [
  {id:qid(), name:"Complete denture", done:0, target:1},
  {id:qid(), name:"RPD", done:0, target:1},
  {id:qid(), name:"Crown", done:0, target:2},
  {id:qid(), name:"Bridge units", done:0, target:3},
  {id:qid(), name:"Composite restorations", done:0, target:10},
  {id:qid(), name:"Amalgam restorations", done:0, target:5},
  {id:qid(), name:"Root canal treatment", done:0, target:4},
  {id:qid(), name:"Extractions", done:0, target:10},
  {id:qid(), name:"Scaling & polishing", done:0, target:5}
];

function qid(){ return "q" + Math.random().toString(36).slice(2,9); }
function cid(){ return "c" + Date.now().toString(36) + Math.random().toString(36).slice(2,6); }

let state = load();
function load(){
  try{
    const raw = localStorage.getItem(LS_KEY);
    if(raw){ const s = JSON.parse(raw); if(s && Array.isArray(s.cases) && Array.isArray(s.quota)){ s.places = s.places || []; s.tour = s.tour || []; return s; } }
  }catch(e){}
  return { cases:[], quota: DEFAULT_QUOTA.map(q=>({...q})), places:[], tour:[] };
}
function save(){ try{ localStorage.setItem(LS_KEY, JSON.stringify(state)); }catch(e){ toast("Could not save — storage blocked"); } }

/* ---------------- Utils ---------------- */
const $ = s => document.querySelector(s);
function esc(s){ return String(s ?? "").replace(/[&<>"']/g, m => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m])); }
function todayISO(){ const d=new Date(); return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
function daysUntil(iso){
  if(!iso) return null;
  const t = new Date(todayISO()+"T00:00:00"), d = new Date(iso+"T00:00:00");
  return Math.round((d - t) / 86400000);
}
function fmtDate(iso){
  if(!iso) return "—";
  const d = new Date(iso+"T00:00:00");
  return d.toLocaleDateString(undefined,{day:"numeric",month:"short"});
}
function statusIndex(id){ return STATUSES.findIndex(s=>s.id===id); }
function toast(msg){
  const t = $("#toast"); t.textContent = msg; t.classList.add("show");
  clearTimeout(t._h); t._h = setTimeout(()=>t.classList.remove("show"), 2200);
}

/* Case urgency: returns {cls, pill} */
function urgency(c){
  if(c.status === "delivered") return {cls:"done", pill:'<span class="pill done">Done</span>'};
  if(c.status === "remake") return {cls:"overdue", pill:'<span class="pill overdue">Remake</span>'};
  const d = daysUntil(c.due);
  if(d === null) return {cls:"active", pill:""};
  if(d < 0)  return {cls:"overdue", pill:`<span class="pill overdue">Overdue ${-d}d</span>`};
  if(d === 0) return {cls:"soon", pill:'<span class="pill soon">Due today</span>'};
  if(d <= 3) return {cls:"soon", pill:`<span class="pill soon">Due in ${d}d</span>`};
  return {cls:"active", pill:`<span class="pill ok">${fmtDate(c.due)}</span>`};
}

/* ---------------- Tabs ---------------- */
let tab = "today";
document.querySelectorAll("nav button").forEach(b=>{
  b.addEventListener("click", ()=>{ tab = b.dataset.tab; renderTabs(); });
});
function renderTabs(){
  document.querySelectorAll("nav button").forEach(b=>b.classList.toggle("sel", b.dataset.tab===tab));
  document.querySelectorAll(".view").forEach(v=>v.classList.remove("active"));
  $("#view-"+tab).classList.add("active");
  $("#fab").classList.toggle("show", tab==="today" || tab==="cases");
  if(tab==="today") renderToday();
  if(tab==="cases") renderCases();
  if(tab==="quota") renderQuota();
  if(tab==="map") renderMap();
}

/* ---------------- Today ---------------- */
function renderToday(){
  const v = $("#view-today");
  const open = state.cases.filter(c=>c.status!=="delivered");
  const overdue = open.filter(c=>{const d=daysUntil(c.due); return d!==null && d<0;});
  const soon = open.filter(c=>{const d=daysUntil(c.due); return d!==null && d>=0 && d<=7;});
  const atLab = open.filter(c=>c.status==="sent").length;
  const qTotal = state.quota.reduce((a,q)=>a+q.target,0);
  const qDone  = state.quota.reduce((a,q)=>a+Math.min(q.done,q.target),0);
  const behind = state.quota.filter(q=>q.done<q.target).sort((a,b)=>(a.done/a.target)-(b.done/b.target)).slice(0,3);

  let h = `<div class="stats">
    <div class="stat ${overdue.length?"alert":""}"><b>${overdue.length}</b><span>Overdue</span></div>
    <div class="stat ${soon.length?"warn":""}"><b>${soon.length}</b><span>Due ≤ 7 days</span></div>
    <div class="stat"><b>${atLab}</b><span>At the lab</span></div>
  </div>`;

  if(overdue.length){
    h += `<div class="section-title">Needs action</div>` + overdue.map(caseCard).join("");
  }
  if(soon.length){
    h += `<div class="section-title">Coming up</div>` + soon.sort((a,b)=>(a.due||"").localeCompare(b.due||"")).map(caseCard).join("");
  }
  if(!overdue.length && !soon.length){
    h += `<div class="card empty">${open.length ? "Nothing due this week. 🦷" : "No lab cases yet — tap + to add your first case."}</div>`;
  }

  h += `<div class="section-title">Requirements — ${qDone}/${qTotal} signed off</div>`;
  if(behind.length){
    h += behind.map(q=>{
      const pct = q.target ? Math.round(100*q.done/q.target) : 0;
      return `<div class="card" style="padding:11px 15px">
        <div style="display:flex;justify-content:space-between;font-size:14px">
          <b>${esc(q.name)}</b><span class="muted">${q.done}/${q.target} · ${pct}%</span>
        </div>${qbar(q)}</div>`;
    }).join("");
  } else {
    h += `<div class="card empty">All requirements complete. Well done. ✔</div>`;
  }
  v.innerHTML = h;
  bindCaseCards(v);
}

/* ---------------- Cases ---------------- */
const FILTERS = [
  {id:"active", label:"Active"},
  {id:"all", label:"All"},
  {id:"overdue", label:"Overdue"},
  {id:"sent", label:"At lab"},
  {id:"remake", label:"Remakes"},
  {id:"delivered", label:"Delivered"}
];
let filter = "active";

function renderCases(){
  $("#caseFilters").innerHTML = FILTERS.map(f=>`<button class="chip ${filter===f.id?"sel":""}" data-f="${f.id}">${f.label}</button>`).join("");
  $("#caseFilters").querySelectorAll(".chip").forEach(b=>b.addEventListener("click",()=>{filter=b.dataset.f; renderCases();}));

  let list = state.cases.slice();
  if(filter==="active") list = list.filter(c=>c.status!=="delivered");
  if(filter==="overdue") list = list.filter(c=>{const d=daysUntil(c.due); return c.status!=="delivered" && d!==null && d<0;});
  if(filter==="sent") list = list.filter(c=>c.status==="sent");
  if(filter==="remake") list = list.filter(c=>c.status==="remake");
  if(filter==="delivered") list = list.filter(c=>c.status==="delivered");

  list.sort((a,b)=>{
    if(a.status==="delivered" !== (b.status==="delivered")) return a.status==="delivered" ? 1 : -1;
    return (a.due||"9999").localeCompare(b.due||"9999");
  });

  $("#caseList").innerHTML = list.length
    ? list.map(caseCard).join("")
    : `<div class="card empty">No cases here. Tap + to add one.</div>`;
  bindCaseCards($("#caseList"));
}

function caseCard(c){
  const u = urgency(c);
  const si = statusIndex(c.status);
  const steps = STATUSES.slice(0,5).map((s,i)=>{
    if(c.status==="remake") return `<i class="${i<=2?"remake":""}"></i>`;
    return `<i class="${i<=si?"on":""}"></i>`;
  }).join("");
  const meta = [
    esc(c.type),
    c.tooth ? "Tooth " + esc(c.tooth) : "",
    c.shade ? `<span class="shade">${esc(c.shade)}</span>` : "",
  ].filter(Boolean).join(" · ");
  return `<button class="case ${u.cls}" data-id="${c.id}">
    <div class="top"><span class="name">${esc(c.patient) || "Unnamed patient"}</span>${u.pill}</div>
    <div class="meta">${meta}${c.lab ? " · " + esc(c.lab) : ""}</div>
    <div class="steps">${steps}</div>
    <div class="status-line"><span>${esc((STATUSES[si]||{}).label || "")}</span><span>${c.due ? "Due " + fmtDate(c.due) : ""}</span></div>
  </button>`;
}

/* ---------------- Quota ---------------- */
function qbar(q){
  const seg = Math.min(q.target, 20) || 1;
  const per = q.target / seg;
  let bars = "";
  for(let i=0;i<seg;i++){
    const filled = q.done >= (i+1)*per - 0.001;
    const last = filled && q.done >= q.target && i === seg-1;
    bars += `<i class="${filled ? "f" + (last?" last":"") : ""}"></i>`;
  }
  return `<div class="qbar">${bars}</div>`;
}
function renderQuota(){
  const v = $("#quotaList");
  if(!state.quota.length){ v.innerHTML = `<div class="card empty">No requirements yet — add your clinic quotas below.</div>`; return; }
  v.innerHTML = state.quota.map(q=>`
    <div class="quota-item" data-id="${q.id}">
      <div class="top">
        <span class="qname">${esc(q.name)} ${q.done>=q.target?'<span class="pill done">Complete</span>':""}</span>
        <span class="count">${q.done}<small>/${q.target}</small></span>
      </div>
      ${qbar(q)}
      <div class="qctrl">
        <button data-act="minus" aria-label="Decrease">−</button>
        <button data-act="plus" aria-label="Increase">+</button>
        <button data-act="edit" class="edit">Edit</button>
      </div>
    </div>`).join("");
  v.querySelectorAll(".quota-item").forEach(el=>{
    const q = state.quota.find(x=>x.id===el.dataset.id);
    el.querySelector('[data-act="plus"]').addEventListener("click",()=>{ q.done++; save(); renderQuota(); if(q.done===q.target) toast(q.name+" complete! 🎉"); });
    el.querySelector('[data-act="minus"]').addEventListener("click",()=>{ if(q.done>0){ q.done--; save(); renderQuota(); } });
    el.querySelector('[data-act="edit"]').addEventListener("click",()=>openQuotaForm(q.id));
  });
}
function openQuotaForm(id){
  const q = id ? state.quota.find(x=>x.id===id) : null;
  openSheet(`
    <h2>${q ? "Edit requirement" : "New requirement"}</h2>
    <label>Name</label><input id="q-name" value="${esc(q?q.name:"")}" placeholder="e.g. Crown preparations">
    <div class="row2">
      <div><label>Target</label><input type="number" id="q-target" min="1" value="${q?q.target:5}"></div>
      <div><label>Done so far</label><input type="number" id="q-done" min="0" value="${q?q.done:0}"></div>
    </div>
    <div style="height:16px"></div>
    <button class="btn" id="q-save">${q ? "Save" : "Add requirement"}</button>
    ${q ? `<div style="height:8px"></div><button class="btn danger" id="q-del">Delete</button>` : ""}
  `);
  $("#q-save").addEventListener("click",()=>{
    const name = $("#q-name").value.trim();

    if(q){ Object.assign(q,{name,target,done}); } else { state.quota.push({id:qid(),name,target,done}); }
    save(); closeSheet(); renderQuota(); toast("Saved");
  });
  if(q) $("#q-del").addEventListener("click",()=>{
    if(!confirm("Delete this requirement?")) return;
    state.quota = state.quota.filter(x=>x.id!==q.id);
    save(); closeSheet(); renderQuota();
  });
}

const GUIDE = [
{ico:"🧪", t:"Impressions — materials & technique", b:`
<h4>Alginate (irreversible hydrocolloid)</h4>
<ul><li>Uses: study casts, opposing arch, denture primary impressions.</li>
<li>Correct water:powder ratio; mix fast to a creamy, streak-free consistency.</li>
<li>Seat with light vibration, hold still until fully set (~2–3 min), remove with one quick snap.</li>
<li><b>Pour within 15–30 minutes</b> — alginate distorts by syneresis/imbibition. If delayed, wrap in a damp tissue in a sealed bag.</li></ul>
<h4>PVS / addition silicone (final impressions)</h4>
<ul><li>Uses: crown & bridge, final denture impressions, implant work.</li>
<li>Putty-wash (2-step or 1-step) or light body with a custom/stock tray + adhesive.</li>
<li>Retract gingiva (cord ± hemostatic agent) so margins are captured clearly.</li>
<li>Latex gloves inhibit PVS setting — avoid touching putty with latex.</li></ul>
<div class="tip">Check every impression before dismissing the patient: margins continuous, no pulls/drags, no bubbles at finish lines, tray not showing through.</div>`},
{ico:"🗿", t:"Pouring casts & custom trays", b:`
<h4>Pouring</h4>
<ol><li>Rinse and disinfect the impression; shake off excess water.</li>
<li>Vacuum-mix (or hand-mix carefully) dental stone to correct W:P ratio.</li>
<li>Add stone in small increments from one end with vibration to chase out air.</li>
<li>Let set 45–60 min before separating; don't leave alginate on stone overnight (surface gets chalky).</li></ol>
<h4>Custom tray (for final denture impressions)</h4>
<ol><li>Block out undercuts on the primary cast, adapt one wax spacer sheet.</li>
<li>Adapt light-cured or self-cure acrylic 2–3 mm thick; add a handle that doesn't distort the lip.</li>
<li>Trim borders 2 mm short of the sulcus to leave room for border molding.</li>
<li>Border mold with greenstick/heavy body, then final wash impression (ZOE or light body PVS).</li></ol>`},
{ico:"👑", t:"Crown & bridge — full workflow", b:`
<ol><li><b>Diagnosis & shade:</b> take shade before preparation (teeth dehydrate and lighten during work).</li>
<li><b>Preparation:</b> occlusal reduction ~1.5–2 mm (functional cusp bevel), axial 1–1.5 mm, taper 6–10°, defined finish line (chamfer for zirconia/metal, shoulder for E-max facial).</li>
<li><b>Retraction & final impression</b> with clear, continuous margins.</li>
<li><b>Bite registration</b> in centric occlusion; face-bow if the case demands.</li>
<li><b>Temporization:</b> well-fitting temp protects the prep, keeps the tooth in position, maintains gingival contour.</li>
<li><b>Lab stage:</b> send prescription (see checklist section), impression/scan, bite, shade, opposing.</li>
<li><b>Try-in / framework check:</b> marginal fit (explorer + radiograph for proximal), contacts (floss snaps, doesn't tear), occlusion.</li>
<li><b>Cementation:</b> isolate, follow cement instructions, remove excess before full set, re-check occlusion.</li></ol>
<div class="warn">Most remakes trace back to the impression or the bite record — check both twice before sending.</div>`},

<ul><li>Take shade at the start of the appointment, teeth fully hydrated.</li>
<li>Use natural daylight or a corrected light source; neutral background (grey bib), no bright lipstick.</li>
<li>Look for ≤ 5–7 seconds per tab, then rest eyes on something grey/blue — the eye fatigues fast for yellows.</li>
<li>Match the middle third of the tooth; note separately cervical, body, incisal + translucency/characterizations.</li>
<li>Photograph the shade tab next to the tooth (tab number visible) and send it to the lab.</li></ul>
<div class="tip">Value (lightness) matters more than hue. When torn between two tabs, choose the higher value — a slightly lighter crown is less noticeable than a darker one.</div>`},
{ico:"😁", t:"Complete denture — the 5 visits", b:`
<ol><li><b>Primary impressions</b> (alginate, stock tray) → primary casts → custom trays.</li>
<li><b>Final impressions:</b> border molding, then wash impression → master casts → record bases + occlusal rims.</li>
<li><b>Jaw relations:</b> set OVD (freeway space 2–4 mm), record centric relation, mark midline/canine/smile lines, select mould & shade → articulate → teeth setting.</li>
<li><b>Try-in:</b> verify esthetics, phonetics ("S" and "F" sounds), OVD, centric — get patient approval <i>before</i> processing.</li>
<li><b>Delivery:</b> check fit, extension, occlusion (remount if needed); educate on hygiene; review in 24–48 h for sore spots (use pressure-indicating paste).</li></ol>`},
{ico:"🦿", t:"RPD basics — design & stages", b:`
<ul><li>Classify with <b>Kennedy</b> (I bilateral free-end, II unilateral free-end, III bounded, IV anterior crossing midline); Applegate's rules for modifications.</li>
<li>Survey the cast: path of insertion, undercuts for retention, guide planes.</li>
<li>Cr-Co framework components: major connector, minor connectors, rests (on prepared rest seats!), direct retainers (clasps engage ~0.25 mm undercut), indirect retainers for free-end saddles.</li>
<li>Stages: impressions → framework try-in (fit, rests seated, no rock) → altered cast if Kennedy I/II → wax try-in → delivery.</li></ul>
<div class="tip">Prepare rest seats <i>before</i> the final impression — the framework can only be as good as what the lab receives.</div>`},

<ul><li><b>Temporary crowns:</b> bis-acryl in a pre-op matrix (putty or vacuum-formed) is fastest; trim margins flush, adjust occlusion, cement with non-eugenol temp cement if using resin cement later (eugenol inhibits resin).</li>
<li><b>Cement choice:</b> zirconia/metal → RMGI or self-adhesive resin; E-max/veneers → etch + silane + adhesive resin cement; implant crowns → minimal cement, margin supragingival, or screw-retained.</li>
<li>Clean excess at gel stage; floss contacts; check occlusion with articulating paper (patient sitting up).</li></ul>`},
{ico:"📋", t:"Lab prescription checklist (send with every case)", b:`
<ul><li>Patient ID / your name & stage</li>
<li>Restoration type + material (e.g. "monolithic zirconia crown, 11")</li>
<li>Tooth numbers (FDI), pontic design for bridges</li>

<ul><li><b>Crown doesn't seat:</b> tight proximal contacts (adjust with articulating film in the contact), undercuts in prep, stone bubble in the die, impression drag at margin.</li>
<li><b>Open margin:</b> distorted impression, chipped die, over-tapered prep with poor finish line.</li>
<li><b>High occlusion:</b> inaccurate bite record, casts not mounted properly, patient bit into soft record.</li>
<li><b>Wrong shade:</b> shade taken after drying/preparation, poor lighting, no photo sent.</li>
<li><b>Denture doesn't stay:</b> over/under-extended borders, no posterior palatal seal, occlusal disharmony dislodging it.</li>

/* ---------------- WhatsApp helpers ---------------- */
function waDigits(p){
  let d = (p||"").replace(/\D/g,"");
  if(d.startsWith("00")) d = d.slice(2);
  if(d.startsWith("0")) d = "964" + d.slice(1); // Iraqi local → international
  return d;
}
function waLink(phone, text){
  const d = waDigits(phone), t = encodeURIComponent(text||"");
  if(d) return `https://wa.me/${d}` + (t ? `?text=${t}` : "");
  return `https://api.whatsapp.com/send?text=${t}`;
}

const PLACE_CATS = ["Dental lab","Clinic","Supplier","Landmark","Food","Hotel","Other"];
const CAT_COLORS = {"Dental lab":"#0E7C7B","Clinic":"#3E8E5A","Supplier":"#9C7320","Landmark":"#7A5EA8","Food":"#D95D4E","Hotel":"#3B7BB8","Other":"#5A6E77"};
let map=null, markerLayer=null, tourLayer=null, lastTap=null, mapSub="places", shownDay=null;

function ensureMap(){
  if(map) return true;
  if(typeof L === "undefined"){
    $("#map").innerHTML = '<div class="empty">The map needs internet the first time it loads.<br>Connect and reopen this tab.</div>';
    return false;
  }
  map = L.map("map").setView([36.19, 44.01], 12); // Erbil
  L.tileLayer("https://tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19, attribution:"© OpenStreetMap"}).addTo(map);
  markerLayer = L.layerGroup().addTo(map);
  tourLayer = L.layerGroup().addTo(map);
  map.on("click", e=>{
    lastTap = {lat:+e.latlng.lat.toFixed(6), lng:+e.latlng.lng.toFixed(6)};
    const div = document.createElement("div"); div.className = "map-pop";
    const b1 = document.createElement("button"); b1.textContent = "＋ Save place here";
    const b2 = document.createElement("button"); b2.textContent = "⚑ Add tour stop here";
    b1.onclick = ()=>{ map.closePopup(); openPlaceForm(null, lastTap.lat, lastTap.lng); };
    b2.onclick = ()=>{ map.closePopup(); openStopForm(null, null, lastTap.lat, lastTap.lng); };
    div.append(b1, b2);
    L.popup().setLatLng(e.latlng).setContent(div).openOn(map);
  });
  return true;
}

function drawMap(){
  if(!map) return;
  markerLayer.clearLayers(); tourLayer.clearLayers();
  state.places.forEach(p=>{
    L.circleMarker([p.lat, p.lng], {radius:9, color:"#fff", weight:2, fillColor:CAT_COLORS[p.cat]||"#5A6E77", fillOpacity:1})
      .bindPopup(`<b>${esc(p.name)}</b><br>${esc(p.cat)}`).addTo(markerLayer);
  });
  const day = state.tour.find(d=>d.id===shownDay);
  if(day){
    const pts = [];
    day.stops.forEach((st,i)=>{
      if(st.lat == null) return;
      pts.push([st.lat, st.lng]);
      L.marker([st.lat, st.lng], {icon: L.divIcon({className:"", html:`<div class="stopnum">${i+1}</div>`, iconSize:[24,24], iconAnchor:[12,12]})})
        .bindPopup(`<b>${i+1}. ${esc(st.name)}</b>${st.time?"<br>🕐 "+esc(st.time):""}${st.note?"<br>"+esc(st.note):""}`)
        .addTo(tourLayer);
    });
    if(pts.length > 1) L.polyline(pts, {color:"#0E7C7B", weight:3, dashArray:"6 6"}).addTo(tourLayer);
    if(pts.length) map.fitBounds(L.latLngBounds(pts).pad(0.25));
  }
}

  $("#mapTabs").innerHTML =

        <div style="margin-top:10px"><button class="chip" data-addstop="${d.id}" style="box-shadow:none">＋ Add stop${lastTap?" (at tapped point)":""}</button></div>
      </div>`).join("")
      : `<div class="card empty">No tour days yet. Add Day 1, then tap the map to drop numbered stops — the route draws itself.</div>`;
    v.innerHTML = h;
    $("#t-addday").addEventListener("click", ()=>openDayForm(null));
    v.querySelectorAll("[data-show]").forEach(b=>b.addEventListener("click",()=>{ shownDay = shownDay===b.dataset.show ? null : b.dataset.show; drawMap(); renderMapPanel(); }));
    v.querySelectorAll("[data-editday]").forEach(b=>b.addEventListener("click",()=>openDayForm(b.dataset.editday)));
    v.querySelectorAll("[data-addstop]").forEach(b=>b.addEventListener("click",()=>openStopForm(b.dataset.addstop, null, lastTap?lastTap.lat:null, lastTap?lastTap.lng:null)));
    v.querySelectorAll("[data-stop]").forEach(el=>el.addEventListener("click",()=>{ const [d,s]=el.dataset.stop.split(":"); openStopForm(d, s); }));
  }
}

function openPlaceForm(id, lat, lng){
  const p = id ? state.places.find(x=>x.id===id) : null;
  const s = p || {name:"", cat:PLACE_CATS[0], phone:"", notes:"", lat, lng};
  openSheet(`
    <h2>${p ? "Edit place" : "Save place"}</h2>
    <label>Name</label><input id="pl-name" value="${esc(s.name)}" placeholder="e.g. Zanko Dental Lab">
    <label>Category</label><select id="pl-cat">${PLACE_CATS.map(c=>`<option ${c===s.cat?"selected":""}>${c}</option>`).join("")}</select>
    <label>Phone / WhatsApp</label><input id="pl-phone" inputmode="tel" value="${esc(s.phone)}" placeholder="e.g. 0750 123 4567">
    <label>Notes</label><textarea id="pl-notes" rows="2" placeholder="Prices, working hours, who to ask for…">${esc(s.notes)}</textarea>
    <p class="muted" style="margin-top:8px">📌 ${(+s.lat).toFixed(4)}, ${(+s.lng).toFixed(4)}</p>
    <div style="height:10px"></div>
    <button class="btn" id="pl-save">${p ? "Save" : "Save place"}</button>
    ${p ? `<div style="height:8px"></div><button class="btn danger" id="pl-del">Delete place</button>` : ""}
  `);
  $("#pl-save").addEventListener("click",()=>{
    const name = $("#pl-name").value.trim();
    if(!name){ toast("Add a name"); return; }
    const data = {name, cat:$("#pl-cat").value, phone:$("#pl-phone").value.trim(), notes:$("#pl-notes").value.trim(), lat:+s.lat, lng:+s.lng};
    if(p) Object.assign(p, data); else state.places.push({id:cid(), ...data});
    save(); closeSheet(); drawMap(); renderMapPanel(); toast("Place saved");
  });
  if(p) $("#pl-del").addEventListener("click",()=>{
    if(!confirm("Delete this place?")) return;
    state.places = state.places.filter(x=>x.id!==p.id);
    save(); closeSheet(); drawMap(); renderMapPanel();
  });
}

function openDayForm(id){
  const d = id ? state.tour.find(x=>x.id===id) : null;
  openSheet(`
    <h2>${d ? "Edit day" : "New tour day"}</h2>
    <label>Day title</label><input id="d-title" value="${esc(d?d.title:"")}" placeholder="e.g. Citadel & old bazaar">
    <div style="height:14px"></div>
    <button class="btn" id="d-save">${d ? "Save" : "Add day"}</button>
    ${d ? `<div style="height:8px"></div><button class="btn danger" id="d-del">Delete day & its stops</button>` : ""}
  `);
  $("#d-save").addEventListener("click",()=>{
    const title = $("#d-title").value.trim() || "Untitled day";
    if(d) d.title = title; else state.tour.push({id:cid(), title, stops:[]});
    save(); closeSheet(); renderMapPanel(); toast("Saved");
  });
  if(d) $("#d-del").addEventListener("click",()=>{
    if(!confirm("Delete this day and all its stops?")) return;
    state.tour = state.tour.filter(x=>x.id!==d.id);
    if(shownDay===d.id) shownDay = null;
    save(); closeSheet(); drawMap(); renderMapPanel();
  });
}

function openStopForm(dayId, stopId, lat, lng){
  let day = dayId ? state.tour.find(x=>x.id===dayId) : null;
  const st = (day && stopId) ? day.stops.find(x=>x.id===stopId) : null;
  const s = st || {name:"", time:"", note:"", lat:(lat??null), lng:(lng??null)};
  const daySelect = !st && !dayId
    ? `<label>Which day?</label><select id="st-day">${state.tour.map((d,i)=>`<option value="${d.id}">Day ${i+1} — ${esc(d.title)}</option>`).join("")}<option value="__new">＋ New day</option></select>`
    : "";
  openSheet(`
    <h2>${st ? "Edit stop" : "Add tour stop"}</h2>
    ${daySelect}
    <label>Stop name</label><input id="st-name" value="${esc(s.name)}" placeholder="e.g. Erbil Citadel">
    <div class="row2">
      <div><label>Time</label><input id="st-time" value="${esc(s.time)}" placeholder="e.g. 10:00 AM"></div>
      <div><label>Note</label><input id="st-note" value="${esc(s.note)}" placeholder="e.g. buy tickets"></div>
    </div>
    <p class="muted" style="margin-top:8px">${s.lat!=null ? "📌 Pinned at "+(+s.lat).toFixed(4)+", "+(+s.lng).toFixed(4) : "No pin — tap the map first to place this stop, or save without one."}</p>
    <div style="height:10px"></div>
    <button class="btn" id="st-save">${st ? "Save" : "Add stop"}</button>
    ${st ? `<div style="height:8px"></div><button class="btn danger" id="st-del">Delete stop</button>` : ""}
  `);
  $("#st-save").addEventListener("click",()=>{
    const name = $("#st-name").value.trim();
    if(!name){ toast("Give the stop a name"); return; }
    if(!st && !day){
      const sel = $("#st-day");
      if(sel && sel.value !== "__new") day = state.tour.find(x=>x.id===sel.value);
      if(!day){ day = {id:cid(), title:"Day "+(state.tour.length+1), stops:[]}; state.tour.push(day); }
    }
    const data = {name, time:$("#st-time").value.trim(), note:$("#st-note").value.trim(), lat:s.lat, lng:s.lng};
    if(st) Object.assign(st, data); else day.stops.push({id:cid(), ...data});
    save(); closeSheet();
    if(!st){ shownDay = day.id; mapSub = "tour"; }
    drawMap(); renderMapPanel(); toast("Stop saved");
  });
  if(st) $("#st-del").addEventListener("click",()=>{
    if(!confirm("Delete this stop?")) return;
    day.stops = day.stops.filter(x=>x.id!==st.id);
    save(); closeSheet(); drawMap(); renderMapPanel();
  });
}

/* ---------------- Settings / backup ---------------- */
$("#btnSettings").addEventListener("click",()=>{
  openSheet(`
    <h2>Backup & settings</h2>
    <p class="muted">Data lives on this device only. Export a backup before clearing your browser or switching phones.</p>
    <div style="height:10px"></div>
    <button class="btn" id="s-export">Export backup (.json)</button>
    <div style="height:8px"></div>
    <button class="btn ghost" id="s-import">Import backup</button>
    <input type="file" id="s-file" accept="application/json" style="display:none">
    <div style="height:8px"></div>
    <button class="btn ghost" id="s-resetq">Reset quota counts to 0</button>
    <div style="height:8px"></div>
    <button class="btn danger" id="s-wipe">Erase all data</button>
    <p class="muted" style="text-align:center;margin-top:14px">DentLab · ${state.cases.length} cases · ${state.quota.length} requirements</p>
  `);
  $("#s-export").addEventListener("click",()=>{
    const blob = new Blob([JSON.stringify(state,null,2)],{type:"application/json"});
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "dentlab-backup-" + todayISO() + ".json";
    a.click(); URL.revokeObjectURL(a.href);
    toast("Backup downloaded");
  });
  $("#s-import").addEventListener("click",()=>$("#s-file").click());
  $("#s-file").addEventListener("change",e=>{
    const f = e.target.files[0]; if(!f) return;
    const r = new FileReader();
    r.onload = ()=>{ try{
      const s = JSON.parse(r.result);
      if(!s || !Array.isArray(s.cases) || !Array.isArray(s.quota)) throw 0;
      s.places = s.places || []; s.tour = s.tour || [];
      state = s; save(); closeSheet(); renderTabs(); toast("Backup restored");
    }catch(_){ toast("That file isn't a DentLab backup"); } };
    r.readAsText(f);
  });
  $("#s-resetq").addEventListener("click",()=>{
    if(!confirm("Set all requirement counts back to 0?")) return;
    state.quota.forEach(q=>q.done=0); save(); closeSheet(); renderTabs(); toast("Quota reset");
  });
  $("#s-wipe").addEventListener("click",()=>{
    if(!confirm("Erase ALL cases and requirements? Export a backup first if unsure.")) return;
    state = { cases:[], quota: DEFAULT_QUOTA.map(q=>({...q, id:qid()})) };
    save(); closeSheet(); renderTabs(); toast("All data erased");
  });
});

/* ---------------- Sheet plumbing ---------------- */
function openSheet(html){
  $("#sheet").innerHTML = `<div class="grab"></div>` + html;
  $("#overlay").classList.add("show");
  requestAnimationFrame(()=>$("#sheet").classList.add("show"));
}
function closeSheet(){
  $("#sheet").classList.remove("show");
  $("#overlay").classList.remove("show");
}
$("#overlay").addEventListener("click", closeSheet);

/* ---------------- Boot ---------------- */
$("#fab").addEventListener("click",()=>openCaseForm(null));
$("#hdrDate").textContent = new Date().toLocaleDateString(undefined,{weekday:"long", day:"numeric", month:"long"});
renderTabs();
if("serviceWorker" in navigator){
  navigator.serviceWorker.register("sw.js").catch(()=>{});
}
</script>
